    <style>
      body {
        overflow: hidden;
        background: #07030f;
      }

      #canvas-container {
        position: fixed;
        inset: 0;
        z-index: 0;
      }

      .site-header {
        position: fixed;
        top: 14px;
        left: 50%;
        translate: -50% 0;
        z-index: 10;
      }

      header .logo,
      header nav,
      header .btn {
        transition: opacity 0.3s;
      }

      footer {
        position: fixed;
        bottom: 0;
        left: 50%;
        translate: -50% 0;
        z-index: 10;
        width: min(1120px, 92vw);
        color: rgba(255, 255, 255, 0.25);
        font-size: 0.8rem;
        padding: 0.5rem 0 1.2rem;
        pointer-events: none;
        text-align: center;
      }

      footer p {
        margin: 0;
      }

      .bg-noise,
      .orb {
        z-index: 0 !important;
        opacity: 0.08;
      }

      .scene-info {
        position: fixed;
        bottom: 4rem;
        left: 50%;
        translate: -50% 0;
        z-index: 5;
        color: rgba(210, 169, 255, 0.5);
        font-family: "Space Grotesk", sans-serif;
        font-size: 0.75rem;
        letter-spacing: 0.06em;
        text-transform: uppercase;
        pointer-events: none;
        transition: opacity 1s ease;
      }

      .scene-info.hidden {
        opacity: 0;
      }

      .burst-ring {
        position: fixed;
        pointer-events: none;
        z-index: 3;
        border-radius: 50%;
        border: 1px solid rgba(210, 169, 255, 0.6);
        translate: -50% -50%;
        animation: burstRingAnim 1s ease-out forwards;
      }

      @keyframes burstRingAnim {
        0% {
          width: 0;
          height: 0;
          opacity: 1;
        }
        100% {
          width: 120vw;
          height: 120vw;
          opacity: 0;
        }
      }

      @media (max-width: 940px) {
        .site-header {
          top: 8px;
          width: min(94vw, 720px);
        }
      }

      @media (max-width: 640px) {
        .scene-info {
          display: none;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .site-header,
        footer,
        .scene-info {
          transition: none;
        }
        #canvas-container canvas {
          filter: grayscale(0.3);
        }
      }
    </style>

    <script type="importmap">
      {
        "imports": {
          "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
          "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/",
          "opentype.js": "https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.module.js"
        }
      }
    </script>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="logo" href="../" aria-label="bencodess home">
        <img src="../assets/swasser.png" alt="bencodess logo" />
      </a>
      <nav aria-label="Main navigation">
        <a href="../ui/">UI</a>
        <a href="../">Home</a>
        <a
          href="../3d/"
          style="background: rgba(190, 139, 255, 0.2); color: #fff"
          >3D</a
        >
        <a href="../socials/">Socials</a>
        <a href="../contact/">Contact</a>
      </nav>
      <a class="btn ghost" href="../contact/">Say Hi</a>
    </header>

    <div
      id="canvas-container"
      role="img"
      aria-label="Interactive 3D scene"
    ></div>

    <p class="scene-info" id="sceneInfo">
      move mouse to explore &bull; click to interact
    </p>

    <footer>
      <p>&copy; <span id="year"></span> bencodess / stilleswasser93</p>
    </footer>

    <script src="../script.js"></script>

    <script type="module">
      import * as THREE from "three";
      import opentype from "opentype.js";

      const FONT_URL =
        "https://raw.githubusercontent.com/google/fonts/main/ofl/archivoblack/ArchivoBlack-Regular.ttf";
      const REDUCED = window.matchMedia(
        "(prefers-reduced-motion: reduce)",
      ).matches;

      const container = document.getElementById("canvas-container");

      const scene = new THREE.Scene();
      scene.background = new THREE.Color("#07030f");

      const camera = new THREE.PerspectiveCamera(
        50,
        container.clientWidth / container.clientHeight,
        0.1,
        100,
      );
      camera.position.set(0, 0.5, 7);

      const renderer = new THREE.WebGLRenderer({
        antialias: true,
        alpha: false,
        powerPreference: "high-performance",
      });
      renderer.setSize(container.clientWidth, container.clientHeight);
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.toneMapping = THREE.ACESFilmicToneMapping;
      renderer.toneMappingExposure = 1.2;
      container.appendChild(renderer.domElement);

      const ambLight = new THREE.AmbientLight(0x404060, 0.5);
      scene.add(ambLight);

      const dirLight = new THREE.DirectionalLight(0xb06dff, 2.5);
      dirLight.position.set(4, 6, 4);
      scene.add(dirLight);

      const fillLight = new THREE.DirectionalLight(0xd2a9ff, 0.8);
      fillLight.position.set(-3, 1, -4);
      scene.add(fillLight);

      const pointLight = new THREE.PointLight(0x7a2fff, 2, 15);
      pointLight.position.set(-2, 3, 3);
      scene.add(pointLight);

      const textGroup = new THREE.Group();
      textGroup.position.y = 0.2;
      scene.add(textGroup);

      const ringMatInner = new THREE.MeshPhysicalMaterial({
        color: 0xd2a9ff,
        emissive: 0xb06dff,
        emissiveIntensity: 0.4,
        transparent: true,
        opacity: 0.6,
      });
      const ringMatOuter = new THREE.MeshPhysicalMaterial({
        color: 0x7a2fff,
        emissive: 0x7a2fff,
        emissiveIntensity: 0.3,
        transparent: true,
        opacity: 0.4,
      });

      async function buildText() {
        try {
          const resp = await fetch(FONT_URL);
          const buf = await resp.arrayBuffer();
          const font = opentype.parse(buf);

          const text = "Ben";
          const fontSize = 1.5;
          const scale = fontSize / font.unitsPerEm;
          const glyphs = font.stringToGlyphs(text);
          let xCursor = 0;
          const allShapes = [];

          for (const glyph of glyphs) {
            if (!glyph.path) continue;
            const cmds = glyph.path.commands;
            const contours = [];
            let cur = [];

            for (const cmd of cmds) {
              if (cmd.type === "M" && cur.length) {
                contours.push(cur);
                cur = [cmd];
              } else {
                cur.push(cmd);
              }
            }
            if (cur.length) contours.push(cur);

            if (contours.length) {
              const outer = new THREE.Shape();
              for (const c of contours[0]) {
                const x = (c.x + xCursor) * scale;
                const y = -c.y * scale;
                switch (c.type) {
                  case "M":
                    outer.moveTo(x, y);
                    break;
                  case "L":
                    outer.lineTo(x, y);
                    break;
                  case "Q":
                    outer.quadraticCurveTo(
                      (c.x1 + xCursor) * scale,
                      -c.y1 * scale,
                      x,
                      y,
                    );
                    break;
                  case "C":
                    outer.bezierCurveTo(
                      (c.x1 + xCursor) * scale,
                      -c.y1 * scale,
                      (c.x2 + xCursor) * scale,
                      -c.y2 * scale,
                      x,
                      y,
                    );
                    break;
                }
              }

              for (let i = 1; i < contours.length; i++) {
                const hole = new THREE.Path();
                for (const c of contours[i]) {
                  const x = (c.x + xCursor) * scale;
                  const y = -c.y * scale;
                  switch (c.type) {
                    case "M":
                      hole.moveTo(x, y);
                      break;
                    case "L":
                      hole.lineTo(x, y);
                      break;
                    case "Q":
                      hole.quadraticCurveTo(
                        (c.x1 + xCursor) * scale,
                        -c.y1 * scale,
                        x,
                        y,
                      );
                      break;
                    case "C":
                      hole.bezierCurveTo(
                        (c.x1 + xCursor) * scale,
                        -c.y1 * scale,
                        (c.x2 + xCursor) * scale,
                        -c.y2 * scale,
                        x,
                        y,
                      );
                      break;
                  }
                }
                outer.holes.push(hole);
              }

              allShapes.push(outer);
            }
            xCursor += glyph.advanceWidth * scale;
          }

          const textMat = new THREE.MeshPhysicalMaterial({
            color: 0xc88cff,
            emissive: 0x7a2fff,
            emissiveIntensity: 0.25,
            metalness: 0.4,
            roughness: 0.15,
            clearcoat: 0.6,
            clearcoatRoughness: 0.25,
          });

          const extrudeSettings = {
            depth: 0.22,
            bevelEnabled: true,
            bevelThickness: 0.025,
            bevelSize: 0.015,
            bevelSegments: 5,
          };

          const textMeshes = allShapes.map(
            (s) =>
              new THREE.Mesh(
                new THREE.ExtrudeGeometry(s, extrudeSettings),
                textMat,
              ),
          );

          const group = new THREE.Group();
          for (const m of textMeshes) group.add(m);

          const bb = new THREE.Box3().setFromObject(group);
          const cx = (bb.max.x - bb.min.x) / 2;
          const cy = (bb.max.y - bb.min.y) / 2;
          group.position.set(-bb.min.x - cx, -bb.min.y - cy, 0);

          const desiredWidth = 2.2;
          const actualWidth = bb.max.x - bb.min.x;
          if (actualWidth > 0) {
            const s = desiredWidth / actualWidth;
            group.scale.set(s, s, s);
          }

          textGroup.add(group);

          const innerRing = new THREE.Mesh(
            new THREE.TorusGeometry(1.85, 0.02, 32, 64),
            ringMatInner,
          );
          innerRing.rotation.x = Math.PI / 3;
          textGroup.add(innerRing);

          const outerRing = new THREE.Mesh(
            new THREE.TorusGeometry(2.4, 0.015, 24, 80),
            ringMatOuter,
          );
          outerRing.rotation.x = -Math.PI / 4;
          outerRing.rotation.z = 0.3;
          textGroup.add(outerRing);
        } catch (err) {
          console.warn("3D text fallback:", err);
          const geo = new THREE.BoxGeometry(1.2, 0.5, 0.3);
          const mat = new THREE.MeshPhysicalMaterial({
            color: 0xc88cff,
            emissive: 0x7a2fff,
            emissiveIntensity: 0.25,
            metalness: 0.4,
            roughness: 0.15,
          });
          const fallback = new THREE.Mesh(geo, mat);
          textGroup.add(fallback);
        }
      }

      buildText();

      buildText();

      const shapes = [];
      const geoTypes = [
        new THREE.IcosahedronGeometry(0.18, 0),
        new THREE.OctahedronGeometry(0.16, 0),
        new THREE.DodecahedronGeometry(0.14, 0),
        new THREE.TetrahedronGeometry(0.2, 0),
        new THREE.BoxGeometry(0.18, 0.18, 0.18),
      ];
      const shapeColors = [0xc88cff, 0xd2a9ff, 0x9c5dff, 0xb06dff, 0xe8d4ff];

      for (let i = 0; i < 40; i++) {
        const geo = geoTypes[i % geoTypes.length];
        const mat = new THREE.MeshPhysicalMaterial({
          color: shapeColors[i % shapeColors.length],
          emissive: shapeColors[i % shapeColors.length],
          emissiveIntensity: 0.15,
          metalness: 0.3,
          roughness: 0.4,
        });
        const mesh = new THREE.Mesh(geo, mat);

        const radius = 3 + Math.random() * 2.5;
        const angle = Math.random() * Math.PI * 2;

        mesh.position.set(
          Math.cos(angle) * radius,
          (Math.random() - 0.5) * 2.5,
          Math.sin(angle) * radius,
        );

        mesh.userData = {
          angle,
          radius,
          speed: 0.15 + Math.random() * 0.35,
          rotSpeed: 0.3 + Math.random() * 1.2,
          ySpeed: 0.2 + Math.random() * 0.4,
          yPhase: Math.random() * Math.PI * 2,
          yRange: 0.3 + Math.random() * 0.6,
          baseY: mesh.position.y,
        };

        scene.add(mesh);
        shapes.push(mesh);
      }

      const starCount = 4000;
      const starGeo = new THREE.BufferGeometry();
      const starPos = new Float32Array(starCount * 3);

      for (let i = 0; i < starCount; i++) {
        const r = 12 * Math.cbrt(Math.random());
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        starPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
        starPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        starPos[i * 3 + 2] = r * Math.cos(phi);
      }

      starGeo.setAttribute("position", new THREE.BufferAttribute(starPos, 3));

      const starMat = new THREE.PointsMaterial({
        color: 0xd2a9ff,
        size: 0.035,
        transparent: true,
        opacity: 0.7,
        blending: THREE.AdditiveBlending,
        sizeAttenuation: true,
      });
      const stars = new THREE.Points(starGeo, starMat);
      scene.add(stars);

      const glowGeo = new THREE.RingGeometry(1.8, 2.4, 64);
      const glowMat = new THREE.MeshBasicMaterial({
        color: 0x7a2fff,
        transparent: true,
        opacity: 0.08,
        side: THREE.DoubleSide,
        depthWrite: false,
      });
      const glowRing = new THREE.Mesh(glowGeo, glowMat);
      glowRing.rotation.x = -Math.PI / 2;
      glowRing.position.y = -0.5;
      scene.add(glowRing);

      let mouseX = 0;
      let mouseY = 0;
      let targetX = 0;
      let targetY = 0;

      const onPointerMove = (e) => {
        mouseX = (e.clientX / window.innerWidth) * 2 - 1;
        mouseY = -(e.clientY / window.innerHeight) * 2 + 1;
      };

      window.addEventListener("mousemove", onPointerMove, { passive: true });
      window.addEventListener(
        "touchmove",
        (e) => {
          const touch = e.touches[0];
          if (touch) {
            mouseX = (touch.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(touch.clientY / window.innerHeight) * 2 + 1;
          }
        },
        { passive: true },
      );

      const infoEl = document.getElementById("sceneInfo");
      let infoTimer;

      const hideInfo = () => infoEl.classList.add("hidden");
      const resetInfo = () => {
        infoEl.classList.remove("hidden");
        clearTimeout(infoTimer);
        infoTimer = setTimeout(hideInfo, 5000);
      };

      resetInfo();

      window.addEventListener(
        "mousemove",
        () => {
          resetInfo();
        },
        { once: false },
      );

      window.addEventListener(
        "click",
        (e) => {
          const ring = document.createElement("div");
          ring.className = "burst-ring";
          ring.style.left = e.clientX + "px";
          ring.style.top = e.clientY + "px";
          document.body.appendChild(ring);
          setTimeout(() => ring.remove(), 1000);
        },
        { passive: true },
      );

      if (REDUCED) {
        document.querySelectorAll(".orb, .bg-noise").forEach((el) => {
          el.style.display = "none";
        });
      }

      const clock = new THREE.Clock();
      const clockSpeed = REDUCED ? 0.15 : 1;

      function animate() {
        requestAnimationFrame(animate);

        const t = clock.getElapsedTime() * clockSpeed;

        textGroup.rotation.x += 0.003 * clockSpeed;
        textGroup.rotation.y += 0.008 * clockSpeed;

        const pulse = REDUCED ? 1 : 1 + Math.sin(t * 0.6) * 0.03;
        textGroup.scale.set(pulse, pulse, pulse);

        const children = textGroup.children;
        if (children.length >= 3) {
          children[children.length - 2].rotation.z += 0.004 * clockSpeed;
          children[children.length - 1].rotation.z -= 0.003 * clockSpeed;
        }

        glowRing.rotation.z += 0.002 * clockSpeed;

        for (const mesh of shapes) {
          const d = mesh.userData;
          d.angle += d.speed * 0.008 * clockSpeed;
          const yOffset = Math.sin(t * d.ySpeed + d.yPhase) * d.yRange;

          mesh.position.x = Math.cos(d.angle) * d.radius;
          mesh.position.z = Math.sin(d.angle) * d.radius;
          mesh.position.y = d.baseY + yOffset;

          mesh.rotation.x += d.rotSpeed * 0.008 * clockSpeed;
          mesh.rotation.y += d.rotSpeed * 0.012 * clockSpeed;
        }

        stars.rotation.y += 0.00015 * clockSpeed;

        const smoothFactor = REDUCED ? 0.2 : 0.04;
        targetX += (mouseX * 2 - targetX) * smoothFactor;
        targetY += (-mouseY * 1.5 - targetY) * smoothFactor;

        camera.position.x = targetX;
        camera.position.y = 0.5 + targetY;
        camera.lookAt(0, 0.2, 0);

        pointLight.position.x = -2 + mouseX * 1.5;
        pointLight.position.y = 3 + mouseY * 1;

        renderer.render(scene, camera);
      }

      animate();

      const onResize = () => {
        const w = container.clientWidth;
        const h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
      };

      window.addEventListener("resize", onResize);

      document.getElementById("year").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
