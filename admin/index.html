<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | bencodess</title>
    <link rel="icon" type="image/png" href="../assets/swasser-round.png?v=2" />
    <meta name="description" content="Admin area." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .admin-lock {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 0;
      }

      .admin-lock-card {
        width: min(520px, 92vw);
      }

      .admin-lock-form {
        margin-top: 0.9rem;
        display: grid;
        gap: 0.6rem;
      }

      .admin-lock-input {
        width: 100%;
        border-radius: 12px;
        border: 1px solid rgba(194, 151, 255, 0.58);
        background: linear-gradient(180deg, rgba(56, 31, 98, 0.88), rgba(32, 17, 59, 0.9));
        color: #f6ecff;
        padding: 0.72rem 0.84rem;
        font: inherit;
      }

      .admin-lock-status {
        margin: 0.2rem 0 0;
        min-height: 1.2rem;
        color: #ffc6cc;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <main class="admin-lock">
      <article id="adminGateCard" class="project-card admin-lock-card">
        <p class="eyebrow">Restricted</p>
        <h1>Admin <span>Area</span></h1>
        <p class="lead">Enter password to continue.</p>
        <form id="adminLockForm" class="admin-lock-form" novalidate>
          <input
            id="adminPassword"
            class="admin-lock-input"
            type="password"
            autocomplete="current-password"
            placeholder="Password"
            required
          />
          <button class="btn" type="submit">Unlock</button>
        </form>
        <p id="adminLockStatus" class="admin-lock-status" aria-live="polite"></p>
      </article>

      <article id="adminPanel" class="project-card admin-lock-card hidden">
        <p class="eyebrow">Unlocked</p>
        <h1>Admin <span>Panel</span></h1>
        <p class="lead">Admin route unlocked in this browser session.</p>
        <div class="hero-actions">
          <a class="btn" href="../index.html">Back Home</a>
          <a class="btn ghost" href="../projects.html">Projects</a>
          <button id="adminLogoutBtn" class="btn ghost" type="button">Lock again</button>
        </div>
      </article>
    </main>

    <script>
      const ADMIN_PASSWORD = '64826482';

      const form = document.getElementById('adminLockForm');
      const passwordEl = document.getElementById('adminPassword');
      const statusEl = document.getElementById('adminLockStatus');
      const gateCardEl = document.getElementById('adminGateCard');
      const panelEl = document.getElementById('adminPanel');
      const logoutBtn = document.getElementById('adminLogoutBtn');

      function setUnlockedState(isUnlocked) {
        if (gateCardEl) gateCardEl.classList.toggle('hidden', isUnlocked);
        if (panelEl) panelEl.classList.toggle('hidden', !isUnlocked);
      }

      setUnlockedState(sessionStorage.getItem('admin_unlocked') === '1');

      if (form && passwordEl && statusEl) {
        form.addEventListener('submit', (event) => {
          event.preventDefault();
          const value = passwordEl.value;
          if (value === ADMIN_PASSWORD) {
            sessionStorage.setItem('admin_unlocked', '1');
            statusEl.textContent = '';
            passwordEl.value = '';
            setUnlockedState(true);
            return;
          }
          statusEl.textContent = 'Wrong password.';
        });
      }

      if (logoutBtn) {
        logoutBtn.addEventListener('click', () => {
          sessionStorage.removeItem('admin_unlocked');
          setUnlockedState(false);
        });
      }
    </script>
  </body>
</html>
