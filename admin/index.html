<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Admin | bencodess</title>
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#07030f" />
    <link rel="canonical" href="https://benslogs.dev/admin/" />
    <link rel="icon" type="image/png" href="../assets/swasser-round.png?v=2" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .admin-body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }
      .admin-main {
        flex: 1;
        display: flex;
        flex-direction: column;
      }
      .admin-main > .section {
        flex: 1;
      }

      .admin-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 2rem;
      }
      .admin-header h2 {
        font-size: 1.5rem;
        font-weight: 700;
        margin: 0;
      }
      .admin-header .date {
        font-family: "Space Grotesk", monospace;
        font-size: 0.8rem;
        color: var(--muted);
      }

      .stats-row {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
        gap: 1rem;
        margin-bottom: 2rem;
      }
      .stat-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 1.25rem;
        transition: transform 200ms;
      }
      .stat-card:hover {
        transform: translateY(-2px);
      }
      .stat-card .label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        color: var(--muted);
        font-weight: 500;
        font-family: "Space Grotesk", monospace;
      }
      .stat-card .value {
        font-size: 1.8rem;
        font-weight: 700;
        margin-top: 0.3rem;
        font-family: "Space Grotesk", monospace;
        color: var(--accent);
      }
      .stat-card .value.small {
        font-size: 0.95rem;
        font-weight: 400;
        color: var(--muted);
      }

      .admin-card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 1.5rem;
        margin-bottom: 1.5rem;
      }
      .admin-card h3 {
        font-size: 0.85rem;
        font-weight: 500;
        color: var(--muted);
        margin-bottom: 1rem;
        font-family: "Space Grotesk", monospace;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .current-status-bar {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem 1rem;
        background: var(--bg-soft);
        border-radius: 12px;
        margin-bottom: 1rem;
        font-size: 0.9rem;
        border: 1px solid transparent;
      }
      .current-status-bar .dot {
        width: 10px; height: 10px;
        border-radius: 50%;
        background: var(--accent);
        flex-shrink: 0;
        box-shadow: 0 0 8px var(--accent);
      }
      .current-status-bar .time {
        color: var(--muted);
        font-family: "Space Grotesk", monospace;
        font-size: 0.75rem;
        margin-left: auto;
      }

      .admin-form { display: grid; gap: 0.75rem; }
      .admin-form textarea,
      .admin-form input {
        width: 100%;
        padding: 0.75rem 1rem;
        border-radius: 12px;
        border: 1px solid var(--line);
        background: var(--bg-soft);
        color: var(--ink);
        font-family: "Outfit", sans-serif;
        font-size: 0.9rem;
        resize: vertical;
        min-height: 80px;
        outline: none;
        transition: border-color 200ms, box-shadow 200ms;
      }
      .admin-form textarea:focus,
      .admin-form input:focus {
        border-color: var(--accent);
        box-shadow: 0 0 0 3px rgba(176, 109, 255, 0.2);
      }

      .btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.4rem;
        border-radius: 12px;
        border: none;
        font-family: "Outfit", sans-serif;
        font-size: 0.85rem;
        font-weight: 600;
        cursor: pointer;
        transition: background 200ms, opacity 200ms, transform 200ms;
      }
      .btn-primary {
        background: var(--accent);
        color: #fff;
      }
      .btn-primary:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-primary:disabled {
        opacity: 0.4;
        cursor: default;
        transform: none;
      }



      .status-msg { font-size: 0.8rem; font-family: "Space Grotesk", monospace; }
      .status-msg.ok { color: var(--accent); }
      .status-msg.err { color: #ef4444; }

      #authView, #adminView { display: none; }
      #authView.active, #adminView.active { display: block; }

      .auth-section {
        display: grid;
        place-items: center;
        min-height: 60vh;
      }
      .auth-box {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 2.5rem;
        width: 100%;
        max-width: 380px;
      }
      .auth-box h2 {
        font-size: 1.4rem;
        font-weight: 700;
        margin: 0 0 0.25rem;
      }
      .auth-box .sub {
        color: var(--muted);
        font-size: 0.85rem;
        margin-bottom: 1.5rem;
      }
      .auth-form { display: grid; gap: 0.75rem; }
      .auth-form label {
        font-size: 0.8rem;
        color: var(--muted);
        font-family: "Space Grotesk", monospace;
      }
      .auth-form .btn { justify-self: start; margin-top: 0.5rem; }

      .user-tag {
        font-size: 0.8rem;
        color: var(--muted);
        font-family: "Space Grotesk", monospace;
      }

      .inline-loader {
        display: inline-block;
        width: 14px; height: 14px;
        border: 2px solid var(--line);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        vertical-align: middle;
      }
      @keyframes spin { to { transform: rotate(360deg); } }

      @media (max-width: 640px) {
        .stats-row { grid-template-columns: 1fr; }
        .admin-header { flex-direction: column; align-items: flex-start; }
      }
    </style>
  </head>
  <body class="admin-body">
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="logo" href="../" aria-label="bencodess home">
        <img src="../assets/swasser.png" alt="bencodess logo" />
      </a>
      <span class="user-tag" id="userTag" style="margin-left:auto;"></span>
      <button class="btn ghost" id="signoutBtn" style="display:none;">Sign out</button>
    </header>
    <noscript><style>.admin-main { display: none; }</style><p style="color:#fff;padding:2rem;text-align:center;">JavaScript required.</p></noscript>

    <main class="admin-main">
      <div id="authView" class="active">
        <div class="auth-section section">
          <div class="auth-box">
            <h2>Sign in</h2>
            <p class="sub">Supabase authentication</p>
            <form class="admin-form auth-form" id="loginForm">
              <label for="email">Email</label>
              <input id="email" type="email" autocomplete="email" required />
              <label for="password">Password</label>
              <input id="password" type="password" autocomplete="current-password" required />
              <button class="btn btn-primary" type="submit">Sign in</button>
              <p id="authStatus" class="status-msg"></p>
            </form>
          </div>
        </div>
      </div>

      <div id="adminView">
        <section class="section">
          <div class="admin-header">
            <h2>Dashboard</h2>
            <span class="date" id="currentDate"></span>
          </div>

          <div class="stats-row">
            <div class="stat-card">
              <div class="label">Status</div>
              <div class="value" id="statStatus" style="font-size:1rem;font-weight:400;">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Views this week</div>
              <div class="value" id="statViews">—</div>
            </div>
            <div class="stat-card">
              <div class="label">Last updated</div>
              <div class="value small" id="statUpdated">—</div>
            </div>
          </div>

          <div class="admin-card">
            <h3>Update status</h3>
            <div class="current-status-bar" id="currentStatusBar">
              <span class="dot"></span>
              <span id="currentMessage">Loading...</span>
              <span class="time" id="currentTime"></span>
            </div>
            <form class="admin-form" id="statusForm">
              <textarea id="statusMessage" maxlength="280" placeholder="Write your status message..."></textarea>
              <div style="display:flex;align-items:center;gap:0.75rem;">
                <button class="btn btn-primary" type="submit" id="saveBtn">Save</button>
                <span id="adminStatus" class="status-msg"></span>
              </div>
            </form>
          </div>
        </section>
      </div>
    </main>

    <script type="module">
      import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.1/+esm";

      const SUPABASE_URL = "https://wrcamtynhtlgwwbslwst.supabase.co";
      const SUPABASE_ANON_KEY = "sb_publishable_47mqXmlh6giKIxeKczqaqg_CeQoBXMc";
      const FUNCTION_URL = `${SUPABASE_URL}/functions/v1/admin-auth`;

      const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
      const authView = document.getElementById("authView");
      const adminView = document.getElementById("adminView");

      document.getElementById("currentDate").textContent = new Date().toLocaleDateString("en-US", { weekday: "short", year: "numeric", month: "short", day: "numeric" });

      function showView(view) {
        authView.classList.toggle("active", view === "auth");
        adminView.classList.toggle("active", view === "admin");
        document.getElementById("signoutBtn").style.display = view === "admin" ? "" : "none";
      }

      async function loadDashboard() {
        try {
          const res = await fetch(FUNCTION_URL);
          const data = await res.json();
          document.getElementById("currentMessage").textContent = data.message || "Available";
          document.getElementById("statStatus").textContent = data.message || "Available";
          document.getElementById("statViews").textContent = data.views_this_week != null ? data.views_this_week : "—";
          if (data.updated_at) {
            const d = new Date(data.updated_at);
            document.getElementById("currentTime").textContent = d.toLocaleString();
            document.getElementById("statUpdated").textContent = d.toLocaleString();
          }
          document.getElementById("statusMessage").value = data.message || "";
        } catch {
          document.getElementById("currentMessage").textContent = "Could not load";
        }
      }

      supabase.auth.onAuthStateChange((event, session) => {
        if (session) {
          document.getElementById("userTag").textContent = session.user?.email || "Signed in";
          showView("admin");
          loadDashboard();
        } else {
          document.getElementById("userTag").textContent = "";
          showView("auth");
        }
      });

      document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const email = document.getElementById("email").value;
        const password = document.getElementById("password").value;
        const status = document.getElementById("authStatus");
        status.className = "status-msg";
        status.innerHTML = '<span class="inline-loader"></span> Signing in...';

        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          status.className = "status-msg err";
          status.textContent = error.message;
        } else {
          status.textContent = "";
        }
      });

      document.getElementById("signoutBtn").addEventListener("click", () => {
        supabase.auth.signOut();
      });

      document.getElementById("statusForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const message = document.getElementById("statusMessage").value.trim();
        const status = document.getElementById("adminStatus");
        const btn = document.getElementById("saveBtn");

        if (!message) {
          status.className = "status-msg err";
          status.textContent = "Message cannot be empty.";
          return;
        }

        status.className = "status-msg";
        status.textContent = "Saving...";
        btn.disabled = true;

        const { data: { session } } = await supabase.auth.getSession();

        try {
          const res = await fetch(FUNCTION_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              "Authorization": `Bearer ${session.access_token}`,
            },
            body: JSON.stringify({ message }),
          });

          if (!res.ok) {
            const err = await res.json();
            throw new Error(err.error || "Failed");
          }

          status.className = "status-msg ok";
          status.textContent = "Saved";
          loadDashboard();
        } catch (err) {
          status.className = "status-msg err";
          status.textContent = err.message;
        } finally {
          btn.disabled = false;
        }
      });
    </script>
  </body>
</html>
