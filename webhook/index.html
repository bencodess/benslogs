<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Webhook Sender | bencodess</title>
    <meta name="description" content="Send messages to any Discord channel via a webhook URL." />
    <meta name="author" content="bencodess" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#07030f" />
    <link rel="canonical" href="https://benslogs.dev/webhook/" />
    <link rel="icon" type="image/png" href="../assets/swasser-round.png?v=2" />
    <meta property="og:title" content="Webhook Sender | bencodess" />
    <meta property="og:description" content="Send messages to any Discord channel via a webhook URL." />
    <meta property="og:image" content="https://benslogs.dev/assets/swasser.png" />
    <meta property="og:url" content="https://benslogs.dev/webhook/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BensLogs" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Webhook Sender | bencodess" />
    <meta name="twitter:description" content="Send messages to any Discord channel via a webhook URL." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg: #07030f;
        --bg-soft: #120821;
        --surface: #1a1030;
        --surface-2: #231542;
        --line: #4e2f7d;
        --ink: #f5ecff;
        --muted: #c5b1e6;
        --accent: #b06dff;
        --accent-2: #d2a9ff;
        --radius: 18px;
        --shadow: 0 20px 46px rgba(66, 18, 128, 0.5);
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html { height: 100%; }

      body {
        min-height: 100%;
        font-family: "Outfit", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 18% 14%, #4c1a85 0%, transparent 35%),
          radial-gradient(circle at 84% 78%, #2f0f58 0%, transparent 33%),
          linear-gradient(160deg, #07030f 0%, #120821 54%, #1a0d32 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1.5rem;
        line-height: 1.55;
      }

      @keyframes cardIn {
        from { opacity: 0; transform: translateY(20px) scale(0.96); }
        to { opacity: 1; transform: translateY(0) scale(1); }
      }

      @keyframes fadeUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes glowPulse {
        0% { box-shadow: 0 0 0 0 rgba(176, 109, 255, 0.5); }
        70% { box-shadow: 0 0 0 14px transparent; }
        100% { box-shadow: 0 0 0 0 transparent; }
      }

      @keyframes shimmer {
        0% { background-position: -200% center; }
        100% { background-position: 200% center; }
      }

      @keyframes statusSlide {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }

      @keyframes borderGlow {
        0%, 100% { border-color: var(--line); }
        50% { border-color: rgba(176, 109, 255, 0.5); }
      }

      .card {
        width: 100%;
        max-width: 520px;
        background: linear-gradient(145deg, var(--surface), var(--surface-2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 2rem;
        box-shadow: var(--shadow);
        animation: cardIn 0.45s ease-out;
      }

      .card-head {
        text-align: center;
        margin-bottom: 2rem;
        animation: fadeUp 0.4s ease-out 0.1s both;
      }

      .card-icon {
        width: 54px;
        height: 54px;
        margin: 0 auto 0.8rem;
        background: linear-gradient(135deg, var(--accent), var(--accent-2));
        border-radius: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        animation: glowPulse 2.5s ease-in-out infinite;
        transition: transform 300ms ease;
      }

      .card-icon:hover {
        transform: rotate(-8deg) scale(1.05);
      }

      .card-head h1 {
        font-family: "Space Grotesk", sans-serif;
        font-size: 1.45rem;
        font-weight: 700;
      }

      .card-head p {
        color: var(--muted);
        font-size: 0.9rem;
        margin-top: 0.2rem;
      }

      .field {
        margin-bottom: 1.1rem;
        animation: fadeUp 0.4s ease-out both;
      }

      .field:nth-child(1) { animation-delay: 0.15s; }
      .field:nth-child(2) { animation-delay: 0.22s; }
      .field:nth-child(3) { animation-delay: 0.29s; }
      .field:nth-child(4) { animation-delay: 0.36s; }

      .field label {
        display: block;
        font-size: 0.78rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.07em;
        color: #d4bcf7;
        margin-bottom: 0.35rem;
        transition: color 200ms ease;
      }

      .field:focus-within label {
        color: var(--accent-2);
      }

      .input {
        width: 100%;
        appearance: none;
        -webkit-appearance: none;
        border-radius: 14px;
        border: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(56, 31, 98, 0.88), rgba(32, 17, 59, 0.9));
        color: var(--ink);
        padding: 0.7rem 0.9rem;
        font: inherit;
        font-size: 0.92rem;
        transition: border-color 200ms ease, box-shadow 200ms ease, transform 150ms ease;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.04), 0 8px 20px rgba(18, 7, 33, 0.35);
      }

      .input::placeholder {
        color: rgba(225, 205, 252, 0.5);
        transition: opacity 180ms ease;
      }

      .input:focus::placeholder {
        opacity: 0.4;
      }

      .input:focus {
        outline: none;
        border-color: rgba(233, 201, 255, 0.7);
        box-shadow: 0 0 0 3px rgba(190, 141, 255, 0.25), 0 12px 24px rgba(20, 8, 37, 0.45);
        transform: scale(1.005);
      }

      .input.has-value {
        border-color: rgba(176, 109, 255, 0.35);
      }

      textarea.input {
        resize: none;
        overflow: hidden;
        min-height: 88px;
      }

      .preview {
        border-radius: 14px;
        border: 1px solid var(--line);
        background: rgba(0, 0, 0, 0.25);
        padding: 1rem;
        display: grid;
        gap: 0.3rem;
        min-height: 78px;
        transition: border-color 300ms ease, box-shadow 300ms ease;
      }

      .preview.has-content {
        border-color: rgba(176, 109, 255, 0.4);
        box-shadow: 0 0 20px rgba(176, 109, 255, 0.08);
      }

      .preview .p-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 0.95rem;
        color: #f4e9ff;
      }

      .preview .p-desc {
        font-size: 0.85rem;
        color: var(--muted);
        white-space: pre-wrap;
        word-break: break-word;
        margin: 0;
        transition: color 200ms ease;
      }

      .preview .p-footer {
        font-size: 0.72rem;
        color: #8b72b0;
        margin: 0;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 0.75rem;
        margin-top: 1.5rem;
        animation: fadeUp 0.4s ease-out 0.43s both;
      }

      .btn {
        position: relative;
        overflow: hidden;
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        border: 1px solid #b780ff;
        border-radius: 999px;
        background: linear-gradient(135deg, #9c5dff, #c88cff);
        color: #10051f;
        font: inherit;
        font-weight: 800;
        font-size: 0.9rem;
        padding: 0.65rem 1.3rem;
        cursor: pointer;
        transition: transform 180ms ease, box-shadow 180ms ease, filter 180ms ease;
      }

      .btn::after {
        content: "";
        position: absolute;
        inset: -50%;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
        background-size: 200% 100%;
        transition: opacity 300ms ease;
        opacity: 0;
        pointer-events: none;
      }

      .btn:hover::after {
        opacity: 1;
        animation: shimmer 1.2s ease-in-out infinite;
      }

      .btn:hover {
        transform: translateY(-2px);
        box-shadow: var(--shadow);
        filter: brightness(1.05);
      }

      .btn:active {
        transform: scale(0.97) translateY(0);
      }

      .btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
        transform: none !important;
        box-shadow: none !important;
        filter: none !important;
      }

      .btn .spinner {
        display: none;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        border: 2px solid rgba(16, 5, 31, 0.2);
        border-top-color: #10051f;
        animation: spin 0.6s linear infinite;
      }

      .btn.is-sending .spinner { display: inline-block; }
      .btn.is-sending .btn-label { display: none; }

      .status {
        font-size: 0.85rem;
        min-height: 1.3em;
        display: flex;
        align-items: center;
        gap: 0.4rem;
        color: var(--muted);
        animation: statusSlide 0.3s ease-out;
      }

      .status svg { flex: 0 0 16px; }
      .status.ok { color: #b6ffd3; }
      .status.err { color: #ffc6cc; }

      .back-link-wrap {
        margin-top: 1.5rem;
        text-align: center;
        animation: fadeUp 0.4s ease-out 0.5s both;
      }

      .back-link {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        color: #8b72b0;
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 600;
        transition: color 160ms ease, transform 160ms ease;
      }

      .back-link:hover {
        color: var(--muted);
        transform: translateX(-3px);
      }

      @media (max-width: 600px) {
        body { padding: 0.75rem; }
        .card { padding: 1.25rem; }
        .card-head h1 { font-size: 1.2rem; }
        .actions { flex-direction: column; align-items: stretch; }
        .btn { justify-content: center; }
      }

      @media (prefers-reduced-motion: reduce) {
        .card, .field, .card-head, .actions, .back-link-wrap { animation: none; }
        .card-icon { animation: none; }
        .btn, .input, .back-link { transition: none; }
        .btn::after { display: none; }
        .btn:hover { transform: none; }
        .btn .spinner { animation: none; border-color: rgba(16, 5, 31, 0.4); }
        .status { animation: none; }
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="card-head">
        <div class="card-icon">
          <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#10051f" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
        </div>
        <h1>Webhook Sender</h1>
        <p>Send a message to any Discord channel</p>
      </div>

      <form id="whForm">
        <div class="field">
          <label for="whUrl">Webhook URL</label>
          <input class="input" id="whUrl" type="url" placeholder="https://discord.com/api/webhooks/..." required autocomplete="off" spellcheck="false" />
        </div>

        <div class="field">
          <label for="whUsername">Bot name <span style="color: #8b72b0; font-weight: 400; text-transform: none;">(optional)</span></label>
          <input class="input" id="whUsername" type="text" placeholder="My Bot" autocomplete="off" />
        </div>

        <div class="field">
          <label for="whMessage">Message</label>
          <textarea class="input" id="whMessage" rows="3" placeholder="Type your message..." required></textarea>
        </div>

        <div class="field">
          <label>Preview</label>
          <div class="preview" id="whPreview">
            <div class="p-title" id="previewTitle">New message</div>
            <p class="p-desc" id="previewDesc">Your message will appear here...</p>
            <p class="p-footer" id="previewFooter">via webhook</p>
          </div>
        </div>

        <div class="actions">
          <button class="btn" type="submit" id="sendBtn">
            <span class="spinner"></span>
            <span class="btn-label">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="vertical-align: middle; margin-right: 0.15rem;">
                <line x1="22" y1="2" x2="11" y2="13"/>
                <polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
              Send
            </span>
          </button>
          <p class="status" id="whStatus"></p>
        </div>
      </form>

      <div class="back-link-wrap">
        <a class="back-link" href="../">
          <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="19" y1="12" x2="5" y2="12"/>
            <polyline points="12 19 5 12 12 5"/>
          </svg>
          Back to home
        </a>
      </div>
    </div>

    <script>
      const form = document.getElementById("whForm");
      const urlEl = document.getElementById("whUrl");
      const usernameEl = document.getElementById("whUsername");
      const messageEl = document.getElementById("whMessage");
      const statusEl = document.getElementById("whStatus");
      const sendBtn = document.getElementById("sendBtn");
      const previewDesc = document.getElementById("previewDesc");
      const previewBox = document.getElementById("whPreview");

      const syncHeight = () => {
        const max = 300;
        messageEl.style.height = "auto";
        messageEl.style.height = Math.min(messageEl.scrollHeight, max) + "px";
        messageEl.style.overflowY = messageEl.scrollHeight > max ? "auto" : "hidden";
      };

      const updatePreview = () => {
        const val = messageEl.value.trim();
        previewDesc.textContent = val || "Your message will appear here...";
        previewBox.classList.toggle("has-content", val.length > 0);
      };

      const trackValue = (el) => {
        el.classList.toggle("has-value", el.value.trim().length > 0);
      };

      syncHeight();
      messageEl.addEventListener("input", syncHeight);
      messageEl.addEventListener("input", updatePreview);

      [urlEl, usernameEl, messageEl].forEach((el) => {
        el.addEventListener("input", () => trackValue(el));
        trackValue(el);
      });

      form.addEventListener("submit", async (e) => {
        e.preventDefault();

        const url = urlEl.value.trim();
        const username = usernameEl.value.trim();
        const content = messageEl.value.trim();

        if (!url) {
          statusEl.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Please enter a webhook URL.`;
          statusEl.className = "status err";
          return;
        }

        if (!content) {
          statusEl.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> Please enter a message.`;
          statusEl.className = "status err";
          return;
        }

        statusEl.textContent = "";
        statusEl.className = "status";
        sendBtn.disabled = true;
        sendBtn.classList.add("is-sending");

        try {
          const res = await fetch(url, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              content,
              ...(username ? { username } : {}),
            }),
          });

          if (!res.ok) {
            const text = await res.text().catch(() => "");
            throw new Error(
              text
                ? `Discord returned ${res.status}: ${text}`
                : `Discord returned ${res.status}`
            );
          }

          statusEl.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg> Message sent!`;
          statusEl.className = "status ok";
          messageEl.value = "";
          previewDesc.textContent = "Your message will appear here...";
          previewBox.classList.remove("has-content");
          syncHeight();
        } catch (err) {
          statusEl.innerHTML = `<svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg> ${err.message}`;
          statusEl.className = "status err";
        } finally {
          sendBtn.disabled = false;
          sendBtn.classList.remove("is-sending");
        }
      });
    </script>
</html>
