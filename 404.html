<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | bencodess</title>
    <link rel="icon" type="image/png" href="/assets/swasser-round.png?v=2" />
    <meta name="description" content="Page not found." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        min-height: 100vh;
      }

      .error-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem 0;
      }

      .error-content {
        width: min(900px, 92vw);
        text-align: center;
        animation: contentIn 620ms cubic-bezier(0.22, 1, 0.36, 1) both;
        display: grid;
        justify-items: center;
      }

      .error-code {
        margin: 0.25rem 0 0;
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(4rem, 16vw, 8rem);
        line-height: 0.9;
        color: #e9d6ff;
        letter-spacing: 0.02em;
        width: 100%;
        text-align: center;
        animation: codePulse 2.8s ease-in-out 1.1s infinite;
      }
      .error-content .lead {
        margin: 0.22rem 0 0;
      }

      .error-path {
        margin: 0.9rem 0 0;
        color: #d5bbf5;
        font-size: 0.95rem;
        word-break: break-all;
      }

      .error-actions {
        margin-top: 1.2rem;
        display: flex;
        gap: 0.7rem;
        justify-content: center;
        flex-wrap: wrap;
        animation: actionsIn 520ms ease 420ms both;
      }

      @keyframes contentIn {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes actionsIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @keyframes codePulse {
        0%,
        100% {
          text-shadow: 0 0 0 rgba(224, 182, 255, 0);
          transform: translateY(0);
        }
        50% {
          text-shadow: 0 0 18px rgba(224, 182, 255, 0.35);
          transform: translateY(-2px);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .error-content,
        .error-code,
        .error-actions {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <main>
      <section class="error-wrap">
        <div class="error-content">
          <p class="error-code">404</p>
          <p class="lead">Page not found.</p>
          <p class="error-path">
            Requested path: <code id="requestedPath">/</code>
          </p>
          <div class="error-actions">
            <a class="btn" href="/index.html">Back Home</a>
            <a class="btn ghost" href="/projects.html">Open Projects</a>
            <a class="btn ghost" href="/contact.html">Open Contact</a>
          </div>
        </div>
      </section>
    </main>

    <script>
      const requestedPathEl = document.getElementById('requestedPath');
      if (requestedPathEl) requestedPathEl.textContent = window.location.pathname || '/';
    </script>
  </body>
</html>
