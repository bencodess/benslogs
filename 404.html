    <link rel="stylesheet" href="/styles.css" />
    <style>
      body {
        min-height: 100vh;
        overflow: hidden;
      }

      .error-wrap {
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 2rem;
      }

      .error-content {
        text-align: center;
        display: grid;
        justify-items: center;
        gap: 0.8rem;
        position: relative;
      }

      .glitch-wrap {
        position: relative;
        display: inline-block;
        animation: drift 5s ease-in-out infinite;
      }

      .glitch {
        font-family: "Space Grotesk", sans-serif;
        font-size: clamp(7rem, 25vw, 14rem);
        font-weight: 700;
        line-height: 0.85;
        margin: 0;
        color: #d2a9ff;
        position: relative;
        text-shadow:
          0 0 40px rgba(176, 109, 255, 0.4),
          0 0 80px rgba(176, 109, 255, 0.2);
        animation: glitchSkew 4s infinite;
      }

      .glitch::before,
      .glitch::after {
        display: none;
      }

      .glow-ring {
        position: absolute;
        border-radius: 50%;
        border: 1.5px solid rgba(176, 109, 255, 0.15);
        pointer-events: none;
      }

      .glow-ring:nth-child(1) {
        inset: -30px;
        animation: ringSpin 6s linear infinite;
      }

      .glow-ring:nth-child(2) {
        inset: -50px;
        border-color: rgba(176, 109, 255, 0.08);
        animation: ringSpin 8s linear infinite reverse;
      }

      .glow-ring:nth-child(3) {
        inset: -70px;
        border-color: rgba(255, 255, 255, 0.04);
        animation: ringSpin 10s linear infinite;
      }

      .glow-ring:nth-child(4) {
        inset: -90px;
        border-color: rgba(176, 109, 255, 0.04);
        border-style: dashed;
        animation: ringSpin 12s linear infinite reverse;
      }

      .scan-line {
        width: min(240px, 60vw);
        height: 2px;
        border-radius: 2px;
        background: linear-gradient(90deg, transparent, rgba(176, 109, 255, 0.5), #fff, rgba(176, 109, 255, 0.5), transparent);
        background-size: 200% 100%;
        animation: scanSweep 2s linear infinite;
      }

      .scan-line-2 {
        width: min(160px, 40vw);
        height: 1px;
        border-radius: 1px;
        background: linear-gradient(90deg, transparent, rgba(176, 109, 255, 0.3), transparent);
        animation: scanSweep 3s linear infinite reverse;
        margin-top: -0.5rem;
      }

      .error-path {
        margin: 0.5rem 0 0;
        color: rgba(213, 187, 245, 0.5);
        font-size: 0.85rem;
        font-family: "Space Grotesk", monospace;
        word-break: break-all;
        max-width: 90vw;
        animation: fadeIn 600ms ease forwards;
        opacity: 0;
        animation-delay: 200ms;
      }

      .error-path code {
        color: rgba(213, 187, 245, 0.85);
      }

      .btn-back {
        margin-top: 0.8rem;
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.7rem 1.4rem;
        border-radius: 999px;
        border: 1px solid rgba(176, 109, 255, 0.25);
        background: rgba(176, 109, 255, 0.06);
        color: #f5ecff;
        text-decoration: none;
        font-weight: 700;
        font-size: 0.9rem;
        transition: all 250ms ease;
        animation: fadeIn 600ms ease forwards;
        opacity: 0;
        animation-delay: 400ms;
        backdrop-filter: blur(4px);
      }

      .btn-back:hover {
        background: rgba(176, 109, 255, 0.18);
        border-color: rgba(176, 109, 255, 0.5);
        transform: translateY(-2px);
        box-shadow: 0 8px 30px rgba(176, 109, 255, 0.2);
      }

      .btn-back svg {
        width: 18px;
        height: 18px;
        transition: transform 250ms ease;
      }

      .btn-back:hover svg {
        transform: translateX(-3px);
      }

      @keyframes glitchSkew {
        0%, 100% { transform: skew(0deg); }
        2% { transform: skew(1deg); }
        4% { transform: skew(0deg); }
        30% { transform: skew(0deg); }
        32% { transform: skew(-0.5deg); }
        34% { transform: skew(0deg); }
        60% { transform: skew(0deg); }
        62% { transform: skew(2deg); }
        64% { transform: skew(0deg); }
      }

      @keyframes ringSpin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }

      @keyframes drift {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
      }

      @keyframes scanSweep {
        from { background-position: -200% 0; }
        to { background-position: 200% 0; }
      }

      @keyframes fadeIn {
        to { opacity: 1; }
      }

      @media (prefers-reduced-motion: reduce) {
        .glitch-wrap,
        .glitch,
        .glitch::before,
        .glitch::after,
        .glow-ring,
        .scan-line,
        .scan-line-2 {
          animation: none;
        }
        .glitch::before,
        .glitch::after {
          display: none;
        }
        .error-path,
        .btn-back {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <main>
      <section class="error-wrap">
        <div class="error-content">
          <div class="glitch-wrap">
            <div class="glow-ring"></div>
            <div class="glow-ring"></div>
            <div class="glow-ring"></div>
            <div class="glow-ring"></div>
            <h1 class="glitch" data-text="404">404</h1>
          </div>
          <div class="scan-line"></div>
          <div class="scan-line-2"></div>
          <p class="error-path">
            <code id="requestedPath">/</code>
          </p>
          <a class="btn-back" href="/">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M19 12H5m7-7-7 7 7 7"/>
            </svg>
            Back Home
          </a>
        </div>
      </section>
    </main>

    <script>
      document.getElementById('requestedPath').textContent = window.location.pathname || '/';
    </script>
  </body>
