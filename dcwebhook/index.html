<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DC Webhook | bencodess</title>
    <meta name="description" content="Embedded Discord webhook sender tool." />
    <meta name="author" content="bencodess" />
    <meta name="robots" content="noindex, nofollow" />
    <meta name="theme-color" content="#07030f" />
    <link rel="icon" type="image/png" href="../assets/swasser-round.png?v=2" />
    <meta property="og:title" content="DC Webhook | bencodess" />
    <meta property="og:description" content="Embedded Discord webhook sender." />
    <meta property="og:image" content="https://benslogs.dev/assets/swasser.png" />
    <meta property="og:url" content="https://benslogs.dev/dcwebhook/" />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BensLogs" />
    <meta property="og:locale" content="en_US" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DC Webhook | bencodess" />
    <meta name="twitter:description" content="Embedded Discord webhook sender." />
    <meta name="twitter:image" content="https://benslogs.dev/assets/swasser.png" />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .wh-form {
        display: grid;
        gap: 1rem;
        max-width: 640px;
      }

      .wh-field {
        display: grid;
        gap: 0.35rem;
      }

      .wh-field label {
        font-size: 0.85rem;
        font-weight: 700;
        color: #d4bcf7;
        text-transform: uppercase;
        letter-spacing: 0.06em;
      }

      .wh-embed-preview {
        background: linear-gradient(145deg, var(--surface), var(--surface-2));
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 1rem;
        display: grid;
        gap: 0.4rem;
      }

      .wh-embed-preview .embed-title {
        font-family: "Space Grotesk", sans-serif;
        font-weight: 700;
        font-size: 1.05rem;
        color: #f4e9ff;
      }

      .wh-embed-preview .embed-desc {
        font-size: 0.92rem;
        color: var(--muted);
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .wh-embed-preview .embed-footer {
        font-size: 0.78rem;
        color: #b59ad5;
        margin: 0;
      }

      .wh-status {
        min-height: 1.3em;
        font-size: 0.9rem;
        margin: 0;
      }

      .wh-status.ok {
        color: #b6ffd3;
      }

      .wh-status.err {
        color: #ffc6cc;
      }

      .wh-row {
        display: flex;
        gap: 0.8rem;
        flex-wrap: wrap;
        align-items: center;
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="logo" href="../index.html" aria-label="bencodess home">
        <img src="../assets/swasser.png" alt="bencodess logo" />
      </a>
      <nav>
        <a href="../projects.html">Projects</a>
        <a href="../index.html">Home</a>
        <a href="../contact.html">Contact</a>
      </nav>
      <a class="btn ghost" href="../index.html">Go home</a>
    </header>

    <main>
      <section class="hero reveal">
        <p class="eyebrow">Tool</p>
        <h1>Discord <span>Webhook</span> Sender</h1>
        <p class="lead">
          Send messages to any Discord channel via a webhook URL.
        </p>
      </section>

      <section class="section reveal">
        <form class="wh-form" id="whForm">
          <div class="wh-field">
            <label for="whUrl">Webhook URL</label>
            <input
              class="feedback-input"
              id="whUrl"
              type="url"
              placeholder="https://discord.com/api/webhooks/..."
              required
            />
          </div>

          <div class="wh-field">
            <label for="whUsername">Bot name (optional)</label>
            <input
              class="feedback-input"
              id="whUsername"
              type="text"
              placeholder="My Bot"
            />
          </div>

          <div class="wh-field">
            <label for="whMessage">Message</label>
            <textarea
              class="feedback-input feedback-textarea"
              id="whMessage"
              rows="4"
              placeholder="Type your message..."
              required
            ></textarea>
          </div>

          <div class="wh-field">
            <label>Preview</label>
            <div class="wh-embed-preview" id="whPreview">
              <div class="embed-title" id="previewTitle">New message</div>
              <p class="embed-desc" id="previewDesc">Your message will appear here...</p>
              <p class="embed-footer" id="previewFooter">via webhook</p>
            </div>
          </div>

          <div class="wh-row">
            <button class="btn" type="submit">Send</button>
            <p class="wh-status" id="whStatus"></p>
          </div>
        </form>
      </section>
    </main>

    <footer>
      <p>&copy; <span id="year"></span> bencodess / stilleswasser93. All rights reserved.</p>
    </footer>

    <script src="../script.js"></script>
    <script>
      const form = document.getElementById('whForm');
      const urlEl = document.getElementById('whUrl');
      const usernameEl = document.getElementById('whUsername');
      const messageEl = document.getElementById('whMessage');
      const statusEl = document.getElementById('whStatus');
      const previewDesc = document.getElementById('previewDesc');

      const syncTextarea = () => {
        const maxHeight = 300;
        messageEl.style.height = 'auto';
        messageEl.style.height = Math.min(messageEl.scrollHeight, maxHeight) + 'px';
        messageEl.style.overflowY = messageEl.scrollHeight > maxHeight ? 'auto' : 'hidden';
      };

      syncTextarea();
      messageEl.addEventListener('input', syncTextarea);

      messageEl.addEventListener('input', () => {
        previewDesc.textContent = messageEl.value.trim() || 'Your message will appear here...';
      });

      form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const url = urlEl.value.trim();
        const username = usernameEl.value.trim();
        const content = messageEl.value.trim();

        if (!url) {
          statusEl.textContent = 'Please enter a webhook URL.';
          statusEl.className = 'wh-status err';
          return;
        }

        if (!content) {
          statusEl.textContent = 'Please enter a message.';
          statusEl.className = 'wh-status err';
          return;
        }

        statusEl.textContent = 'Sending...';
        statusEl.className = 'wh-status';

        const body = {
          content,
          ...(username ? { username } : {}),
        };

        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            const text = await res.text().catch(() => '');
            throw new Error(text ? `Discord returned ${res.status}: ${text}` : `Discord returned ${res.status}`);
          }

          statusEl.textContent = 'Message sent!';
          statusEl.className = 'wh-status ok';
          messageEl.value = '';
          previewDesc.textContent = 'Your message will appear here...';
          syncTextarea();
        } catch (err) {
          statusEl.textContent = err.message;
          statusEl.className = 'wh-status err';
        }
      });
    </script>
  </body>
</html>
