    <title>Licenses | bencodess</title>
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#07030f" />
    <link rel="canonical" href="https://benslogs.dev/licenses/" />
    <link rel="icon" type="image/png" href="../assets/swasser-round.png?v=2" />
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="../styles.css" />
    <style>
      .license-grid {
        display: grid;
        gap: 0.5rem;
      }
      .license-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 0.6rem 1rem;
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 10px;
        font-size: 0.85rem;
        font-family: "Space Grotesk", monospace;
      }
      .license-row .name { color: var(--ink); }
      .license-row .lic { color: var(--accent-2); font-size: 0.75rem; }
      .license-count {
        color: var(--muted);
        font-size: 0.9rem;
        font-family: "Space Grotesk", monospace;
      }
    </style>
  </head>
  <body>
    <div class="bg-noise" aria-hidden="true"></div>
    <div class="orb orb-a" aria-hidden="true"></div>
    <div class="orb orb-b" aria-hidden="true"></div>

    <header class="site-header">
      <a class="logo" href="../" aria-label="bencodess home">
        <img src="../assets/swasser.png" alt="bencodess logo" />
      </a>
      <nav>
        <a href="../ui/">UI</a>
        <a href="../">Home</a>
        <a href="../socials/">Socials</a>
        <a href="../feedback/">Feedback</a>
        <a href="../contact/">Contact</a>
      </nav>

        <h1>Licenses</h1>
        <p class="lead">Software licenses for this project and its dependencies.</p>
      </section>

      <section class="section reveal">
        <p class="license-count" id="licenseCount"></p>
        <div class="license-grid" id="licenseList"></div>
      </section>
    </main>

      </div>
      <div class="footer-row">
        <p>&copy; <span id="year"></span> bencodess / stilleswasser93</p>
      </div>
    </footer>
