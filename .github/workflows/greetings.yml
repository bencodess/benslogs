name: greetings
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

concurrency:
  group: greetings-${{ github.event.issue?.number || github.event.pull_request?.number || github.ref }}
  cancel-in-progress: true

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Thanks for opening your first issue! I'll take a look as soon as possible.
          pr-message: |
            Thanks for your first pull request! I'll review it shortly.
