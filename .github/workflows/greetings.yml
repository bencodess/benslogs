name: greetings
on:
  issues:
    types: [opened]
  pull_request_target:
    types: [opened]

concurrency:
  group: greetings-${{ github.event.issue.number || github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const isIssue = context.payload.issue !== undefined;
            const isPR = context.payload.pull_request !== undefined;

            if (isIssue) {
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                creator: context.payload.issue.user.login,
              });
              if (issues.length === 1) {
                await github.rest.issues.createComment({
                  issue_number: context.payload.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: "Thanks for opening your first issue! I'll take a look as soon as possible.",
                });
              }
            }

            if (isPR) {
              const { data: prs } = await github.rest.pulls.list({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'all',
                creator: context.payload.pull_request.user.login,
              });
              if (prs.length === 1) {
                await github.rest.issues.createComment({
                  issue_number: context.payload.pull_request.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: "Thanks for your first pull request! I'll review it shortly.",
                });
              }
            }
